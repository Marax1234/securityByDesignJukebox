name: CI/CD - Build & Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - run: pip install -r backend/requirements.txt
      - name: Syntax check
        run: python -m py_compile $(git ls-files "*.py")
      - name: SAST - bandit
        run: |
          pip install bandit
          mkdir -p evidence/sast
          bandit -r backend/ --severity-level high -f json -o evidence/sast/bandit.json
      - name: SCA - pip-audit
        run: |
          pip install pip-audit
          mkdir -p evidence/sca
          pip-audit -r backend/requirements.txt -f json -o evidence/sca/pip-audit.json
      - name: Secret scan - gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
          mkdir -p evidence/secrets
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --report-format json \
            --report-path evidence/secrets/gitleaks.json \
            --exit-code 1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-reports
          path: |
            evidence/sast/bandit.json
            evidence/sca/pip-audit.json
            evidence/secrets/gitleaks.json

  build-and-verify:
    needs: scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Build Tailwind CSS
        run: |
          npm ci
          npm run css:build
      - name: Build Docker image
        run: docker build -t jukebox:latest .
      # To push the image to a registry later, uncomment and adapt:
      # - uses: docker/login-action@v2
      #   with:
      #     registry: ghcr.io
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}
      # - run: |
      #     docker tag jukebox:latest ghcr.io/<owner>/jukebox:latest
      #     docker push ghcr.io/<owner>/jukebox:latest
      - name: Generate SBOM (CycloneDX JSON)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin
          mkdir -p evidence/sbom
          syft jukebox:latest \
            -o cyclonedx-json=evidence/sbom/sbom.json
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: jukebox:latest
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          vuln-type: os,library
          trivy-config: trivy.yaml
      - name: Record run metadata
        if: always()
        run: |
          mkdir -p evidence/run
          cat <<EOF > evidence/run/run-info.json
          {
            "workflow":    "${{ github.workflow }}",
            "run_id":      "${{ github.run_id }}",
            "run_number":  "${{ github.run_number }}",
            "sha":         "${{ github.sha }}",
            "ref":         "${{ github.ref }}",
            "actor":       "${{ github.actor }}",
            "timestamp":   "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "image":       "jukebox:latest"
          }
          EOF
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-evidence
          path: |
            evidence/sbom/sbom.json
            evidence/run/run-info.json
