name: CI/CD - Build, Push & Sign

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - run: pip install -r backend/requirements.txt
      - name: Syntax check
        run: python -m py_compile $(git ls-files "*.py")
      - name: SAST - bandit
        run: |
          pip install bandit
          mkdir -p evidence/sast
          bandit -r backend/ --severity-level high -f json -o evidence/sast/bandit.json
      - name: SCA - pip-audit
        run: |
          pip install pip-audit
          mkdir -p evidence/sca
          pip-audit -r backend/requirements.txt -f json -o evidence/sca/pip-audit.json
      - name: Secret scan - gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
          mkdir -p evidence/secrets
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --report-format json \
            --report-path evidence/secrets/gitleaks.json \
            --exit-code 1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-reports
          path: |
            evidence/sast/bandit.json
            evidence/sca/pip-audit.json
            evidence/secrets/gitleaks.json

  build:
    needs: scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Build Tailwind CSS
        run: |
          npm ci
          npm run css:build
      - uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: docker build -t ghcr.io/jan-01/jukebox:latest .
      - run: docker push ghcr.io/jan-01/jukebox:latest

  sbom:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate SBOM from image (CycloneDX JSON)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin
          mkdir -p evidence/sbom
          syft ghcr.io/jan-01/jukebox:latest \
            -o cyclonedx-json=evidence/sbom/sbom.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: evidence/sbom/sbom.json

  sign:
    needs: [build, sbom]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: sigstore/cosign-installer@v3.4.0
      - uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Sign image
        env:
          COSIGN_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          mkdir -p evidence/signing
          echo "$COSIGN_KEY" | tr -d '\r' > cosign.key
          cosign sign --yes --key cosign.key ghcr.io/jan-01/jukebox:latest \
            2>&1 | tee evidence/signing/sign.log
          echo "---" >> evidence/signing/sign.log
          echo "Image:     ghcr.io/jan-01/jukebox:latest" >> evidence/signing/sign.log
          echo "Git SHA:   ${{ github.sha }}" >> evidence/signing/sign.log
          echo "Timestamp: $(date -u)" >> evidence/signing/sign.log
      - uses: actions/upload-artifact@v4
        with:
          name: signing-evidence
          path: evidence/signing/sign.log

  quality-gate:
    needs: sign
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: sigstore/cosign-installer@v3.4.0
      - uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Verify image signature
        env:
          COSIGN_PUBLIC_KEY: ${{ secrets.COSIGN_PUBLIC_KEY }}
        run: |
          mkdir -p evidence/signing
          echo "$COSIGN_PUBLIC_KEY" | tr -d '\r' > cosign.pub
          cosign verify --key cosign.pub ghcr.io/jan-01/jukebox:latest \
            2>&1 | tee evidence/signing/verify.log
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/jan-01/jukebox:latest
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL       # CVSS >= 7.0 (HIGH 7.0–8.9, CRITICAL 9.0–10.0)
          vuln-type: os,library
          trivy-config: trivy.yaml
      - name: Record run metadata
        if: always()
        run: |
          mkdir -p evidence/run
          cat <<EOF > evidence/run/run-info.json
          {
            "workflow":    "${{ github.workflow }}",
            "run_id":      "${{ github.run_id }}",
            "run_number":  "${{ github.run_number }}",
            "sha":         "${{ github.sha }}",
            "ref":         "${{ github.ref }}",
            "actor":       "${{ github.actor }}",
            "timestamp":   "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "image":       "ghcr.io/jan-01/jukebox:latest"
          }
          EOF
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quality-gate-evidence
          path: |
            evidence/signing/verify.log
            evidence/run/run-info.json
